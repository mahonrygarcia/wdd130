<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="/styles/rafting.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact White Water Rafting for reservations, questions, and adventure information.">
    <meta name="author" content="Mahonrry Garcia">
    <title>Contact Us | White Water Rafting</title>

</head>
<body>

    <header>

        <img src="images/logo.png" alt="White Water Rafting Company Logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>

    </header>
    
<main>
    <section class="contact-info">
        <h1>White Water Rafting Company</h1>

        <p>Mar mediterraneo #261</p>
        <p>91699 Hacienda Paraíso, Veracruz</p>
        <p>+52 238 215 3312</p>
        <p>contact_us@whitewaterrafting.com</p>
        
    </section>

    <section class="contact-content">
        <div class="map">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15078.614632649793!2d-96.16547880118144!3d19.122844043135107!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x85c34383734083a5%3A0xe09600e0636614eb!2sGlorieta%20Mar%20Mediterr%C3%A1neo!5e0!3m2!1ses-419!2smx!4v1781390299877!5m2!1ses-419!2smx" width="600" height="450"  allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>        </div>

        <form>
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Placeholder" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Placeholder" required>

            <span class="form-title">Message Purpose</span>
            <div class="radio-group">
                <label for="general">
                    <input type="radio" id="general" name="purpose" value="general" checked> General Inquiry
                </label>
                <label for="reservation">
                    <input type="radio" id="reservation" name="purpose" value="reservation"> Reservation Question
                </label>
                <label for="suggestion">
                    <input type="radio" id="suggestion" name="purpose" value="suggestion"> Website Suggestion
                </label>
            </div>

            <label for="message">Message</label>
            <textarea id="message" name="message" rows="4" placeholder="Type here"></textarea>

            <div class="checkbox-container">
                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">Please subscribe me to the monthly newsletter</label>
            </div>

            <button type="submit">Get in Touch!</button>
        </form>
    </section>

    <section class="employees-section">
        <h2>We Are Here to Serve You</h2>
        <div class="employees-container">
            <figure>
                <img src="images/employee1.jpg" alt="Employee Profile">
                <figcaption>Joaquin Gutierrez- Lead River Guide</figcaption>
            </figure>
            <figure>
                <img src="images/employee2.jpg" alt="Employee Profile">
                <figcaption>Sarah Johnson - Trip Coordinator</figcaption>
            </figure>
            <figure>
                <img src="images/employee3.jpg" alt="Employee Profile">
                <figcaption>Alex Brown - Safety Instructor</figcaption>
            </figure>
        </div>
    </section>
</main>

    <footer>
        <p>© 2026 🌊 White Water Rafting 🌊 | Mahonrry Garcia</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.png" alt="Facebook">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.png" alt="linkedin">
            </a>
            <a href="http://instagram.com">
                <img src="images/instagram.png" alt="Instagram">
            </a>
        </nav>
    </footer>
    
</body>
</html>
